AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
    aws files for SBPD - CSULA webhook handler

Globals:
    Function:
        Timeout: 60
        Environment:
            Variables:
                SMARTSHEET_ACCESS_TOKEN: !Ref MySecret
                BOX_ACCESS_TOKEN: !Ref MySecret
                GMAIL_APP_PASSWORD: !Ref MySecret
                SBPD_STAGE: PROD

Resources:
    SeparationsFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: Separations/
            Handler: lambda_handler.lambda_handler
            Runtime: python3.11
            Architectures:
                - x86_64
            Policies:
                - AWSSecretsManagerGetSecretValuePolicy:
                      SecretArn: !Ref MySecret
            Events:
                HelloWorld:
                    Type: Api
                    Properties:
                        Path: /separations
                        Method: post
            Layers:
                - !Ref CommonDependenciesLayer
                - !Ref ConfigurationDependenciesLayer
    VacanciesFunction:
        Type: AWS::Serverless::Function
        Properties:
            CodeUri: Vacancies/
            Handler: lambda_handler.lambda_handler
            Runtime: python3.11
            Architectures:
                - x86_64
            Policies:
                - AWSSecretsManagerGetSecretValuePolicy:
                      SecretArn: !Ref MySecret
            Events:
                HelloWorld:
                    Type: Api
                    Properties:
                        Path: /vacancies
                        Method: post
            Layers:
                - !Ref CommonDependenciesLayer
                - !Ref ConfigurationDependenciesLayer
    CommonDependenciesLayer:
        Type: AWS::Serverless::LayerVersion
        Properties:
            ContentUri: layers/python-dependencies/
            CompatibleRuntimes:
                - python3.11
        Metadata:
            BuildMethod: python3.11
    ConfigurationDependenciesLayer:
        Type: AWS::Serverless::LayerVersion
        Properties:
            ContentUri: layers/shared-config/python.zip
            CompatibleRuntimes:
                - python3.11
    MySecret:
        Type: AWS::SecretsManager::Secret
        Properties:
            Name: prod/sbpd-csula

Outputs:
    SBPDApi:
        Description: "API Gateway endpoint URL for Prod stage for SBPD - Separations function"
        Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/hello/"
    SeparationsFunction:
        Description: "SBPD - Separations Lambda Function ARN"
        Value: !GetAtt SeparationsFunction.Arn
    SeparationsFunctionIamRole:
        Description: "Implicit IAM Role created for SBPD - Separations function"
        Value: !GetAtt SeparationsFunctionRole.Arn
